version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"      

  - package-ecosystem: "terraform"
    directories:
      - "/terraform/global"
      - "/terraform/environments/dev"
      - "/terraform/environments/prod"
      - "/terraform/modules/static-website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      aws-provider:
        patterns:
          - "hashicorp/aws"
        update-types:
          - "minor"
          - "patch"    
