name: Deploy Website

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-dev
          aws-region: ap-southeast-1

      - name: Sync website files to S3
        run: |
          aws s3 sync website/ s3://haiau68-website-dev \
            --delete \
            --cache-control "max-age=3600"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-prod
          aws-region: ap-southeast-1

      - name: Sync website files to S3
        run: |
          aws s3 sync website/ s3://haiau68-website-prod \
            --delete \
            --cache-control "max-age=3600"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"