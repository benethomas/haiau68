name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-dev
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -reconfigure -input=false

      - name: Terraform Format Check
        working-directory: terraform/environments/dev
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate        

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out tf.plan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply tf.plan

  deploy-prod:
    name: Deploy Prod Infrastructure
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-prod
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -reconfigure -input=false

      - name: Terraform Format Check
        working-directory: terraform/environments/prod
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/environments/prod
        run: terraform validate        

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform plan -out tf.plan

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply tf.plan