name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-dev
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform/environments/dev
        run: terraform init -reconfigure -input=false

      - name: Terraform Format Check
        working-directory: terraform/environments/dev
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/environments/dev
        run: terraform validate        

      - name: Terraform Plan
        working-directory: terraform/environments/dev
        run: terraform plan -out tf.tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/dev
        run: terraform apply tf.tfplan

  deploy-prod:
    name: Deploy Prod Infrastructure
    runs-on: ubuntu-latest
    environment: production
    needs: deploy-dev

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-prod
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform/environments/prod
        run: terraform init -reconfigure -input=false

      - name: Terraform Format Check
        working-directory: terraform/environments/prod
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: terraform/environments/prod
        run: terraform validate        

      - name: Terraform Plan
        working-directory: terraform/environments/prod
        run: terraform plan -out tf.tfplan

      - name: Terraform Apply
        working-directory: terraform/environments/prod
        run: terraform apply tf.tfplan