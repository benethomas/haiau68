name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/environments/**'
      - 'terraform/modules/**'

# Advisory only — posts each environment's plan as a PR comment. Not a required
# check (a plan showing changes is expected, not a failure).
permissions:
  id-token: write        # assume the read-only plan role via OIDC
  contents: read
  pull-requests: write   # post/update the plan comment

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: Plan ${{ matrix.env }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, prod]

    steps:
      - name: Checkout code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d # v6.2.2
        with:
          role-to-assume: arn:aws:iam::128104558019:role/github-actions-haiau68-plan
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: Terraform Init
        working-directory: terraform/environments/${{ matrix.env }}
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: terraform/environments/${{ matrix.env }}
        # -lock=false keeps the role strictly read-only (no lock object written).
        run: terraform plan -lock=false -no-color -input=false

      - name: Comment plan on PR
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ENVIRONMENT: ${{ matrix.env }}
          PLAN_STDOUT: ${{ steps.plan.outputs.stdout }}
          PLAN_OUTCOME: ${{ steps.plan.outcome }}
        # Values passed via env (not inline ${{ }}) to avoid script injection.
        with:
          script: |
            const env = process.env.ENVIRONMENT;
            const outcome = process.env.PLAN_OUTCOME;
            let plan = (process.env.PLAN_STDOUT || '').trim() || '(no plan output — an earlier step may have failed)';
            const LIMIT = 60000;
            if (plan.length > LIMIT) {
              plan = plan.slice(0, LIMIT) + '\n\n... output truncated — see the workflow logs for the full plan.';
            }
            const marker = `<!-- tf-plan-${env} -->`;
            const status = outcome === 'success' ? '✅ planned' : '⚠️ plan failed';
            const body = [
              marker,
              `### Terraform Plan — \`${env}\` (${status})`,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```terraform',
              plan,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
