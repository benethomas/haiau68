name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Validate dev
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # The official checkov-action pins an ancient checkov image (2.0.930) with
      # no version override, which misses cross-resource linking. Run a pinned
      # modern image directly so CI matches local scans.
      - name: Run Checkov
        run: |
          docker run --rm -v "${{ github.workspace }}/terraform:/tf" \
            bridgecrew/checkov:3.3.8 --directory /tf --framework terraform --quiet --compact