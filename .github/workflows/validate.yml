name: Validate

on:
  pull_request:
    branches: [main]

# Read-only: both jobs just check out and scan; nothing needs write access.
permissions:
  contents: read

jobs:
  terraform:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: terraform

      - name: Validate dev
        working-directory: terraform/environments/dev
        run: |
          terraform init -backend=false
          terraform validate

  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # The official checkov-action pins an ancient checkov image (2.0.930) with
      # no version override, which misses cross-resource linking. Run a pinned
      # modern image directly so CI matches local scans.
      - name: Run Checkov
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/terraform:/tf" \
            -v "${{ github.workspace }}/.checkov:/checks" \
            bridgecrew/checkov:3.3.8@sha256:c64ffb6d6fc8087c896341a2c697770a04a1cf558db04fa7b8129d8ca6bce336 \
            --directory /tf --external-checks-dir /checks \
            --framework terraform --quiet --compact